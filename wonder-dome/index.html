<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder Dome - Downtown LA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">Welcome to the <span class="wonder-text">Wonder Dome</span></h1>
            <p class="hero-subtitle">Experience the extraordinary in the heart of Downtown Los Angeles</p>
            
            <div class="signup-container">
                <h2>Get Early Access</h2>
                <p>Be the first to experience something truly magical</p>
                
                <form class="signup-form" id="signupForm">
                    <div class="form-group">
                        <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
                        <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder="Email Address" required>
                        <input type="tel" id="phone" name="phone" placeholder="Phone Number">
                    </div>
                    <div class="form-group full-width">
                        <select id="interest" name="interest" required>
                            <option value="">What interests you most?</option>
                            <option value="experiences">Immersive Experiences</option>
                            <option value="events">Special Events</option>
                            <option value="corporate">Corporate Events</option>
                            <option value="general">General Information</option>
                        </select>
                    </div>
                    <button type="submit" class="signup-btn">Join the Wonder</button>
                </form>
            </div>
        </div>
        
        <div class="city-overlay"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
